# Configuración de Nginx para PMLink Admin
# Agregar este bloque al archivo de configuración del sitio

server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com;  # Cambiar por tu dominio real
    
    # Configuración para PMLink Admin
    location /pmlinkadmin {
        alias /var/www/pmlinkadmin;
        try_files $uri $uri/ /pmlinkadmin/index.html;
        
        # Headers para SPA (Single Page Application)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
        
        # Configuración para archivos principales
        location ~* \.(html|json)$ {
            expires 1h;
            add_header Cache-Control "public";
        }
    }
    
    # Configuración para el sitio principal (si existe)
    location / {
        root /var/www/html;
        index index.html index.htm;
        try_files $uri $uri/ =404;
    }
}

# Si tienes SSL configurado, también agrega:
server {
    listen 443 ssl;
    server_name tu-dominio.com www.tu-dominio.com;
    
    # Certificados SSL (ajustar rutas según tu configuración)
    # ssl_certificate /path/to/certificate.crt;
    # ssl_certificate_key /path/to/private.key;
    
    # Misma configuración que arriba para /pmlinkadmin
    location /pmlinkadmin {
        alias /var/www/pmlinkadmin;
        try_files $uri $uri/ /pmlinkadmin/index.html;
        
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
