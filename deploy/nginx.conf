# Configuración de Nginx para PMLink Admin
# Guardar como: /etc/nginx/sites-available/pmlinkadmin (en el servidor)

server {
    listen 80;
    server_name tu-dominio.com;  # Cambiar por tu dominio real
    
    # Redirección a HTTPS (opcional pero recomendado)
    # return 301 https://$server_name$request_uri;
}

# Configuración HTTPS (opcional)
# server {
#     listen 443 ssl;
#     server_name tu-dominio.com;
#     
#     ssl_certificate /path/to/your/certificate.crt;
#     ssl_certificate_key /path/to/your/private.key;
    
    # Servir la aplicación desde el subdirectorio /pmlinkadmin
    location /pmlinkadmin/ {
        alias /var/www/pmlinkadmin/;
        try_files $uri $uri/ /pmlinkadmin/index.html;
        
        # Configuración para SPA (Single Page Application)
        location ~* /pmlinkadmin/.*$ {
            try_files $uri $uri/ /pmlinkadmin/index.html;
        }
        
        # Configuración de caché para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Headers de seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:;" always;
    }
    
    # Configuración para el root del sitio (opcional)
    location / {
        root /var/www/html;
        index index.html index.htm;
    }
# }
